name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build (strict concurrency, warnings as errors)
        run: |
          xcodebuild build \
            -scheme ImageViewer \
            -destination 'generic/platform=iOS Simulator' \
            OTHER_SWIFT_FLAGS='-strict-concurrency=complete -warnings-as-errors'

      - name: Boot a simulator
        id: sim
        run: |
          # Pick the first available iPhone simulator so we do not pin a model
          # that may not exist on a given Xcode version, then boot it explicitly.
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "import sys,json;d=json.load(sys.stdin);\
print(next(dev['udid'] for runtime in d['devices'].values() \
for dev in runtime if dev.get('isAvailable') and 'iPhone' in dev['name']))")
          echo "Using simulator $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Test
        run: |
          xcodebuild test \
            -scheme ImageViewer \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}"
