name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build (strict concurrency, warnings as errors)
        run: |
          xcodebuild build \
            -scheme ImageViewer \
            -destination 'generic/platform=iOS Simulator' \
            OTHER_SWIFT_FLAGS='-strict-concurrency=complete -warnings-as-errors'

      - name: Boot a simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available | grep -m1 -oE 'iPhone[^()]*\(([-0-9A-F]+)\)' | grep -oE '[-0-9A-F]{36}')
          echo "Using simulator $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Test
        run: |
          xcodebuild test \
            -scheme ImageViewer \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}"
